<svg width="900" height="450" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="100%" height="100%" fill="#0f172a"/>

<!-- Title -->
<text x="450" y="40" fill="#e2e8f0" font-size="20" text-anchor="middle" font-family="Arial">
Splunk Forwarder Connectivity Incident (Network Segmentation)
</text>

<!-- BEFORE SECTION -->
<text x="225" y="80" fill="#f87171" font-size="16" text-anchor="middle">Before (Failure State)</text>

<!-- SkorpiOm -->
<rect x="80" y="150" width="150" height="70" rx="10" fill="#1e293b" stroke="#94a3b8"/>
<text x="155" y="185" fill="#e2e8f0" text-anchor="middle">SkorpiOm</text>
<text x="155" y="205" fill="#94a3b8" text-anchor="middle" font-size="12">Kali + UF</text>

<!-- EagleEye11 -->
<rect x="300" y="150" width="150" height="70" rx="10" fill="#1e293b" stroke="#94a3b8"/>
<text x="375" y="185" fill="#e2e8f0" text-anchor="middle">EagleEye11</text>
<text x="375" y="205" fill="#94a3b8" text-anchor="middle" font-size="12">Splunk Indexer</text>

<!-- Broken line -->
<line x1="230" y1="185" x2="300" y2="185" stroke="#f87171" stroke-width="3" stroke-dasharray="6"/>
<text x="265" y="170" fill="#f87171" font-size="12" text-anchor="middle">Blocked</text>

<!-- Network labels -->
<text x="155" y="250" fill="#94a3b8" text-anchor="middle" font-size="12">Parent Network</text>
<text x="375" y="250" fill="#94a3b8" text-anchor="middle" font-size="12">Burrow Network</text>

<!-- AFTER SECTION -->
<text x="675" y="80" fill="#4ade80" font-size="16" text-anchor="middle">After (Resolved State)</text>

<!-- SkorpiOm -->
<rect x="580" y="150" width="150" height="70" rx="10" fill="#1e293b" stroke="#94a3b8"/>
<text x="655" y="185" fill="#e2e8f0" text-anchor="middle">SkorpiOm</text>
<text x="655" y="205" fill="#94a3b8" text-anchor="middle" font-size="12">Kali + UF</text>

<!-- EagleEye11 -->
<rect x="780" y="150" width="150" height="70" rx="10" fill="#1e293b" stroke="#94a3b8"/>
<text x="855" y="185" fill="#e2e8f0" text-anchor="middle">EagleEye11</text>
<text x="855" y="205" fill="#94a3b8" text-anchor="middle" font-size="12">Splunk Indexer</text>

<!-- Good connection -->
<line x1="730" y1="185" x2="780" y2="185" stroke="#4ade80" stroke-width="3"/>
<text x="755" y="170" fill="#4ade80" font-size="12" text-anchor="middle">TCP 9997</text>

<!-- Network label -->
<text x="715" y="250" fill="#94a3b8" text-anchor="middle" font-size="12">Burrow Network (10.0.0.0/24)</text>

<!-- Footer -->
<text x="450" y="400" fill="#64748b" font-size="12" text-anchor="middle">
Demonstrates network segmentation impact on log ingestion pipelines
</text>

</svg>
